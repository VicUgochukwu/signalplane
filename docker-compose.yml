services:
  signalplane:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: signalplane-app
    ports:
      - "3000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
